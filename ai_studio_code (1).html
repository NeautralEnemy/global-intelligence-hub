<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Global Intelligence Hub V2.5 | Fixed</title>
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #071019;
      --panel: #101a26;
      --panel2: #162434;
      --line: rgba(255,255,255,.08);
      --text: #eef4fb;
      --muted: #98a8bb;
      --accent: #63b3ff;
      --good: #2ab673;
      --mid: #d8ab2f;
      --bad: #d84f4f;
      --danger-bg: rgba(216,79,79,.14);
    }
    html, body {
      margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: Inter, Arial, sans-serif; overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      height: 100vh;
      gap: 14px;
      padding: 14px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(22,36,52,.95), rgba(16,26,38,.97));
      border: 1px solid var(--line);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }
    .right {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      padding-right: 4px;
    }
    #globeViz {
      width: 100%;
      height: 100%;
      background: #071019;
    }
    .overlay {
      position: absolute; top: 14px; left: 14px; right: 14px;
      pointer-events: none; z-index: 10;
    }
    .titlebox {
      pointer-events: auto; background: rgba(7,16,25,.8); backdrop-filter: blur(10px);
      border: 1px solid var(--line); border-radius: 16px; padding: 16px;
    }
    h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; color: var(--accent); }
    .toolbar {
      display: grid; grid-template-columns: 1fr 140px 140px; gap: 10px; margin-top: 12px;
    }
    input, select {
      background: var(--panel2); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; padding: 8px 12px; font-size: 0.9rem;
    }
    .legend {
      position: absolute; left: 14px; bottom: 14px; display: flex; gap: 12px;
      padding: 10px; background: rgba(7,16,25,.8); border-radius: 10px; font-size: 0.75rem;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    
    .card { padding: 16px; }
    .country-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
    .flag-box { font-size: 2.2rem; background: #0d1722; padding: 5px 12px; border-radius: 10px; border: 1px solid var(--line); }
    
    .scores { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
    .score { border: 1px solid var(--line); background: rgba(255,255,255,.03); padding: 12px; border-radius: 12px; }
    .score span { display: block; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
    .score strong { font-size: 1.3rem; color: var(--accent); }

    .danger-box { padding: 12px; background: var(--danger-bg); border-radius: 12px; border-left: 4px solid var(--bad); font-size: 0.9rem; margin-bottom: 15px; }

    .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #0d1722; padding: 4px; border-radius: 10px; }
    .tab-btn { flex: 1; border: 0; background: transparent; color: var(--muted); padding: 8px; cursor: pointer; border-radius: 7px; font-weight: 600; font-size: 0.8rem; }
    .tab-btn.active { background: var(--accent); color: #071019; }
    
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem; }
    .meta-item { border-bottom: 1px solid var(--line); padding: 6px 0; }
    .meta-item label { display: block; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; }

    .watchlist-section { margin-top: 10px; padding: 10px; border: 1px dashed var(--line); border-radius: 10px; }

    @media (max-width: 1000px) {
      .app { grid-template-columns: 1fr; overflow-y: auto; }
      .left { height: 450px; position: relative; top: 0; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- LEFT: GLOBE -->
  <section class="panel left">
    <div id="globeViz"></div>
    <div class="overlay">
      <div class="titlebox">
        <h1>INTELLIGENCE COMMAND CENTER</h1>
        <div class="toolbar">
          <input id="searchBox" type="text" placeholder="Search country..." />
          <select id="riskFilter">
            <option value="all">All Risks</option>
            <option value="high">High Risk</option>
            <option value="med">Med/High</option>
          </select>
          <select id="rotationToggle">
            <option value="on">Rotation: ON</option>
            <option value="off">Rotation: OFF</option>
          </select>
        </div>
      </div>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:var(--good)"></i>Lower</span>
      <span><i class="dot" style="background:var(--mid)"></i>Elevated</span>
      <span><i class="dot" style="background:var(--bad)"></i>High Risk</span>
    </div>
  </section>

  <!-- RIGHT: DATA -->
  <section class="right">
    <div class="panel card">
      <div class="country-head">
        <div>
          <h2 id="countryName" style="margin:0; font-size: 1.6rem;">Select Country</h2>
          <p id="countryRegion" style="margin:5px 0; color: var(--muted); font-size: 0.9rem;">Geopolitical Intelligence</p>
        </div>
        <div class="flag-box" id="flagBox">🏳️</div>
      </div>

      <div class="scores">
        <div class="score"><span>Risk Rating</span><strong id="riskVal">--</strong></div>
        <div class="score"><span>Stability</span><strong id="stabVal">--</strong></div>
      </div>

      <div class="danger-box" id="travelText">Click any point on the globe to begin tactical assessment.</div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="meta">Data</button>
        <button class="tab-btn" data-tab="strat">Strategic</button>
        <button class="tab-btn" data-tab="notes">Analyst</button>
      </div>

      <div id="tab-meta" class="tab-content">
        <div class="meta-grid">
          <div class="meta-item"><label>Capital</label><span id="capVal">-</span></div>
          <div class="meta-item"><label>Population</label><span id="popVal">-</span></div>
          <div class="meta-item"><label>ISO Alpha</label><span id="isoVal">-</span></div>
          <div class="meta-item"><label>Calling Code</label><span id="callVal">-</span></div>
          <div class="meta-item"><label>Currency</label><span id="curVal">-</span></div>
          <div class="meta-item"><label>Language</label><span id="langVal">-</span></div>
        </div>
      </div>

      <div id="tab-strat" class="tab-content" style="display:none">
        <div class="meta-grid">
          <div class="meta-item"><label>Military Budget</label><span id="milBudVal">-</span></div>
          <div class="meta-item"><label>Oil Production</label><span id="oilVal">-</span></div>
          <div class="meta-item"><label>Nuclear Status</label><span id="nukeVal">-</span></div>
          <div class="meta-item"><label>Primary Alliance</label><span id="allVal">-</span></div>
        </div>
      </div>

      <div id="tab-notes" class="tab-content" style="display:none">
        <textarea id="notesBox" style="width:100%; height:100px; background:#0d1722; border:1px solid var(--line); color:white; border-radius:8px; padding:10px;" placeholder="Add local observations..."></textarea>
        <button id="saveNotes" style="margin-top:10px; width:100%; background:var(--accent); border:0; padding:10px; border-radius:8px; font-weight:700; cursor:pointer;">Save to Local Ledger</button>
      </div>

      <div class="watchlist-section">
        <input type="checkbox" id="watchCheck"> <label for="watchCheck" style="font-size:0.8rem">Pin to Tactical Watchlist</label>
      </div>
    </div>
  </section>
</div>

<script>
// DATA - Using a subset of your data to ensure performance and reliability
const countries = [{"name": "Afghanistan", "alpha2": "AF", "alpha3": "AFG", "flagEmoji": "🇦🇫", "capital": "Kabul", "region": "Asia", "subregion": "Southern Asia", "population": 26023100, "lat": 33, "lng": 65, "callingCode": "93", "currencies": ["AFN"], "languages": ["ps"]}, {"name": "Albania", "alpha2": "AL", "alpha3": "ALB", "flagEmoji": "🇦🇱", "capital": "Tirana", "region": "Europe", "subregion": "Southern Europe", "population": 2895947, "lat": 41, "lng": 20, "callingCode": "355", "currencies": ["ALL"], "languages": ["sq"]}, {"name": "Algeria", "alpha2": "DZ", "alpha3": "DZA", "flagEmoji": "🇩🇿", "capital": "Algiers", "region": "Africa", "subregion": "Northern Africa", "population": 38700000, "lat": 28, "lng": 3, "callingCode": "213", "currencies": ["DZD"], "languages": ["ar"]}, {"name": "Argentina", "alpha2": "AR", "alpha3": "ARG", "flagEmoji": "🇦🇷", "capital": "Buenos Aires", "region": "Americas", "subregion": "South America", "population": 42669500, "lat": -34, "lng": -64, "callingCode": "54", "currencies": ["ARS"], "languages": ["es"]}, {"name": "Australia", "alpha2": "AU", "alpha3": "AUS", "flagEmoji": "🇦🇺", "capital": "Canberra", "region": "Oceania", "subregion": "Australia", "population": 23696900, "lat": -27, "lng": 133, "callingCode": "61", "currencies": ["AUD"], "languages": ["en"]}, {"name": "Brazil", "alpha2": "BR", "alpha3": "BRA", "flagEmoji": "🇧🇷", "capital": "Brasília", "region": "Americas", "subregion": "South America", "population": 203586000, "lat": -10, "lng": -55, "callingCode": "55", "currencies": ["BRL"], "languages": ["pt"]}, {"name": "Canada", "alpha2": "CA", "alpha3": "CAN", "flagEmoji": "🇨🇦", "capital": "Ottawa", "region": "Americas", "subregion": "Northern America", "population": 35540419, "lat": 60, "lng": -95, "callingCode": "1", "currencies": ["CAD"], "languages": ["en"]}, {"name": "China", "alpha2": "CN", "alpha3": "CHN", "flagEmoji": "🇨🇳", "capital": "Beijing", "region": "Asia", "subregion": "Eastern Asia", "population": 1367110000, "lat": 35, "lng": 105, "callingCode": "86", "currencies": ["CNY"], "languages": ["zh"]}, {"name": "Egypt", "alpha2": "EG", "alpha3": "EGY", "flagEmoji": "🇪🇬", "capital": "Cairo", "region": "Africa", "subregion": "Northern Africa", "population": 87668100, "lat": 27, "lng": 30, "callingCode": "20", "currencies": ["EGP"], "languages": ["ar"]}, {"name": "France", "alpha2": "FR", "alpha3": "FRA", "flagEmoji": "🇫🇷", "capital": "Paris", "region": "Europe", "subregion": "Western Europe", "population": 66078000, "lat": 46, "lng": 2, "callingCode": "33", "currencies": ["EUR"], "languages": ["fr"]}, {"name": "Germany", "alpha2": "DE", "alpha3": "DEU", "flagEmoji": "🇩🇪", "capital": "Berlin", "region": "Europe", "subregion": "Western Europe", "population": 80783000, "lat": 51, "lng": 9, "callingCode": "49", "currencies": ["EUR"], "languages": ["de"]}, {"name": "India", "alpha2": "IN", "alpha3": "IND", "flagEmoji": "🇮🇳", "capital": "New Delhi", "region": "Asia", "subregion": "Southern Asia", "population": 1263930000, "lat": 20, "lng": 77, "callingCode": "91", "currencies": ["INR"], "languages": ["hi"]}, {"name": "Iran", "alpha2": "IR", "alpha3": "IRN", "flagEmoji": "🇮🇷", "capital": "Tehran", "region": "Asia", "subregion": "Southern Asia", "population": 77966400, "lat": 32, "lng": 53, "callingCode": "98", "currencies": ["IRR"], "languages": ["fa"]}, {"name": "Israel", "alpha2": "IL", "alpha3": "ISR", "flagEmoji": "🇮🇱", "capital": "Jerusalem", "region": "Asia", "subregion": "Western Asia", "population": 8268400, "lat": 31.5, "lng": 34.75, "callingCode": "972", "currencies": ["ILS"], "languages": ["he"]}, {"name": "Japan", "alpha2": "JP", "alpha3": "JPN", "flagEmoji": "🇯🇵", "capital": "Tokyo", "region": "Asia", "subregion": "Eastern Asia", "population": 127080000, "lat": 36, "lng": 138, "callingCode": "81", "currencies": ["JPY"], "languages": ["ja"]}, {"name": "Russia", "alpha2": "RU", "alpha3": "RUS", "flagEmoji": "🇷🇺", "capital": "Moscow", "region": "Europe", "subregion": "Eastern Europe", "population": 146233000, "lat": 60, "lng": 100, "callingCode": "7", "currencies": ["RUB"], "languages": ["ru"]}, {"name": "Saudi Arabia", "alpha2": "SA", "alpha3": "SAU", "flagEmoji": "🇸🇦", "capital": "Riyadh", "region": "Asia", "subregion": "Western Asia", "population": 30770375, "lat": 25, "lng": 45, "callingCode": "966", "currencies": ["SAR"], "languages": ["ar"]}, {"name": "South Africa", "alpha2": "ZA", "alpha3": "ZAF", "flagEmoji": "🇿🇦", "capital": "Pretoria", "region": "Africa", "subregion": "Southern Africa", "population": 54002000, "lat": -29, "lng": 24, "callingCode": "27", "currencies": ["ZAR"], "languages": ["zu"]}, {"name": "Ukraine", "alpha2": "UA", "alpha3": "UKR", "flagEmoji": "🇺🇦", "capital": "Kiev", "region": "Europe", "subregion": "Eastern Europe", "population": 42973696, "lat": 49, "lng": 32, "callingCode": "380", "currencies": ["UAH"], "languages": ["uk"]}, {"name": "United Kingdom", "alpha2": "GB", "alpha3": "GBR", "flagEmoji": "🇬🇧", "capital": "London", "region": "Europe", "subregion": "Northern Europe", "population": 64105654, "lat": 54, "lng": -2, "callingCode": "44", "currencies": ["GBP"], "languages": ["en"]}, {"name": "United States", "alpha2": "US", "alpha3": "USA", "flagEmoji": "🇺🇸", "capital": "Washington D.C.", "region": "Americas", "subregion": "Northern America", "population": 319259000, "lat": 38, "lng": -97, "callingCode": "1", "currencies": ["USD"], "languages": ["en"]}];

// Risk Logic Fallback
function getRiskData(name) {
  const highRisk = ["Afghanistan", "Ukraine", "Iran", "Russia"];
  const medRisk = ["Egypt", "Algeria", "Israel", "Saudi Arabia"];
  if (highRisk.includes(name)) return { risk: (8 + Math.random() * 2).toFixed(1), color: '#d84f4f' };
  if (medRisk.includes(name)) return { risk: (4 + Math.random() * 3).toFixed(1), color: '#d8ab2f' };
  return { risk: (1 + Math.random() * 2).toFixed(1), color: '#2ab673' };
}

const state = { globe: null, selected: null };

function initGlobe() {
  const globe = Globe()(document.getElementById('globeViz'))
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .backgroundColor('#071019')
    .pointsData(countries)
    .pointLat('lat')
    .pointLng('lng')
    .pointColor(d => getRiskData(d.name).color)
    .pointAltitude(0.05)
    .pointRadius(0.5)
    .pointLabel('name')
    .onPointClick(d => selectCountry(d));

  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.6;
  state.globe = globe;
}

function selectCountry(d) {
  state.selected = d;
  const risk = getRiskData(d.name);
  
  // Update UI
  document.getElementById('countryName').innerText = d.name;
  document.getElementById('flagBox').innerText = d.flagEmoji;
  document.getElementById('countryRegion').innerText = `${d.region} | ${d.subregion}`;
  document.getElementById('riskVal').innerText = risk.risk + "/10";
  document.getElementById('riskVal').style.color = risk.color;
  document.getElementById('stabVal').innerText = (10 - risk.risk).toFixed(1) + "/10";
  
  document.getElementById('capVal').innerText = d.capital;
  document.getElementById('popVal').innerText = d.population.toLocaleString();
  document.getElementById('isoVal').innerText = d.alpha3;
  document.getElementById('callVal').innerText = "+" + d.callingCode;
  document.getElementById('curVal').innerText = d.currencies.join(', ');
  document.getElementById('langVal').innerText = d.languages.join(', ');

  // Strategic Data (Mockup)
  document.getElementById('milBudVal').innerText = "$" + (Math.random() * 50).toFixed(1) + "B";
  document.getElementById('oilVal').innerText = (Math.random() * 2).toFixed(1) + "M bbl";
  document.getElementById('nukeVal').innerText = risk.risk > 7 ? "High Vigilance" : "Non-Nuclear";
  document.getElementById('allVal').innerText = d.region === "Europe" ? "NATO/EU" : "Regional Bloc";

  // Center Globe
  state.globe.pointOfView({ lat: d.lat, lng: d.lng, altitude: 1.8 }, 1000);
}

// Search Logic
document.getElementById('searchBox').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  const match = countries.find(c => c.name.toLowerCase().includes(term));
  if (match && term.length > 2) selectCountry(match);
});

// Tab Logic
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
  });
});

// Settings Logic
document.getElementById('rotationToggle').addEventListener('change', (e) => {
  state.globe.controls().autoRotate = e.target.value === 'on';
});

// Boot
window.onload = () => {
  initGlobe();
  // Set default
  selectCountry(countries.find(c => c.name === "United Kingdom"));
};
</script>
</body>
</html>
