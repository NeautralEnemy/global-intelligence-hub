<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Global Intelligence Command V2.6</title>
  
  <!-- Core Libraries -->
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050a0f;
      --panel: rgba(13, 23, 35, 0.85);
      --accent: #63b3ff;
      --good: #2ab673;
      --mid: #d8ab2f;
      --bad: #d84f4f;
      --text: #eef4fb;
      --muted: #89a1bb;
      --border: rgba(99, 179, 255, 0.2);
    }

    * { box-sizing: border-box; }
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; overflow: hidden;
    }

    /* Layout */
    .app {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      height: 100vh;
      padding: 15px;
      gap: 15px;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Globe Section */
    .globe-container { position: relative; }
    #globeViz { width: 100%; height: 100%; }

    /* UI Overlays */
    .header-box {
      position: absolute; top: 20px; left: 20px; right: 20px;
      pointer-events: none; z-index: 10;
    }
    .glass-card {
      pointer-events: auto;
      background: rgba(7, 16, 25, 0.8);
      padding: 20px; border-radius: 16px;
      border-left: 5px solid var(--accent);
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
    
    .search-bar {
      display: grid; grid-template-columns: 1fr 150px 150px; gap: 10px; margin-top: 15px;
    }
    input, select {
      background: #0d1722; border: 1px solid var(--border); color: white;
      padding: 10px; border-radius: 8px; font-size: 0.9rem;
    }

    /* Right Dashboard */
    .dashboard {
      display: flex; flex-direction: column; gap: 15px;
      overflow-y: auto; padding-right: 5px;
    }
    .dashboard::-webkit-scrollbar { width: 4px; }
    .dashboard::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .card { padding: 20px; }
    .country-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .flag { font-size: 3rem; background: #071019; padding: 10px; border-radius: 12px; }
    
    .badge {
      padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 800;
      text-transform: uppercase; margin-left: auto;
    }
    .badge.high { background: rgba(216, 79, 79, 0.2); color: #ffadad; border: 1px solid var(--bad); }
    .badge.low { background: rgba(42, 182, 115, 0.2); color: #9bf0c2; border: 1px solid var(--good); }

    /* Stats Grid */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat {
      background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stat label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
    .stat div { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--accent); margin-top: 5px; }

    /* Intel List */
    .intel-feed { margin-top: 10px; }
    .news-item {
      background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px;
      margin-bottom: 10px; font-size: 0.85rem; border-left: 2px solid var(--border);
    }
    .news-item a { color: var(--accent); text-decoration: none; font-weight: 600; display: block; margin-bottom: 4px; }

    .btn {
      width: 100%; padding: 12px; border-radius: 10px; border: 0;
      font-weight: 700; cursor: pointer; background: var(--accent); color: var(--bg);
      transition: 0.2s;
    }
    .btn:hover { opacity: 0.8; }

    @media (max-width: 1000px) {
      .app { grid-template-columns: 1fr; height: auto; overflow: auto; }
      .panel.left { height: 500px; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- LEFT PANEL: THE GLOBE -->
  <section class="panel globe-container">
    <div id="globeViz"></div>
    
    <div class="header-box">
      <div class="glass-card">
        <h1>Global Intelligence Hub <span style="font-weight: 300; opacity: 0.5;">V2.6</span></h1>
        <div class="search-bar">
          <input type="text" id="countrySearch" placeholder="Search for a country or territory...">
          <select id="riskFilter">
            <option value="all">All Risk Levels</option>
            <option value="high">High Risk</option>
            <option value="med">Medium/High</option>
          </select>
          <select id="rotateToggle">
            <option value="on">Rotation: ON</option>
            <option value="off">Rotation: OFF</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <!-- RIGHT PANEL: THE DATA -->
  <section class="dashboard">
    <div class="panel card">
      <div class="country-header">
        <div class="flag" id="flagIcon">🏳️</div>
        <div>
          <h2 id="nameLabel" style="margin:0">Select a Country</h2>
          <span id="regionLabel" style="color:var(--muted); font-size:0.85rem">Command Ready</span>
        </div>
        <div id="riskBadge" class="badge">---</div>
      </div>

      <div class="grid">
        <div class="stat"><label>Strategic Risk</label><div id="riskScore">--</div></div>
        <div class="stat"><label>Stability Index</label><div id="stabScore">--</div></div>
        <div class="stat"><label>Population</label><div id="popVal">--</div></div>
        <div class="stat"><label>Economic Health</label><div id="econVal">--</div></div>
      </div>

      <div style="margin-bottom: 20px;">
        <label style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Tactical Briefing</label>
        <p id="briefingText" style="font-size: 0.9rem; line-height: 1.6; margin-top: 8px;">
          Select a territory to generate real-time geopolitical intelligence and risk assessment.
        </p>
      </div>

      <div class="intel-feed">
        <label style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Live Intelligence Feed</label>
        <div id="newsList" style="margin-top:10px;">
          <!-- Content populated via JS -->
        </div>
      </div>
    </div>

    <div class="panel card">
      <h3 style="margin-top:0; font-size: 1rem;">Field Observations</h3>
      <textarea id="analystNotes" style="width:100%; height:100px; background:#0d1722; border:1px solid var(--border); border-radius:10px; color:white; padding:12px; font-family:inherit;" placeholder="Add private analyst notes for this region..."></textarea>
      <button class="btn" style="margin-top:10px;" id="saveNotes">Log Observations</button>
    </div>
  </section>
</div>

<script>
/**
 * DATASET 
 * Full border GeoJSON and static intelligence data
 */
const BORDERS_URL = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson';

// Strategic data mapping
const intelMap = {
  "Afghanistan": { risk: 9.4, stab: 1.2, advice: "Extreme conflict environment. Government collapse risk: High. Terrorism activity: Severe." },
  "Ukraine": { risk: 9.1, stab: 3.4, advice: "Active war zone. Ongoing missile/drone strikes. High internal displacement." },
  "Russia": { risk: 8.5, stab: 4.1, advice: "High political volatility. Heavy international sanctions. Restricted movement." },
  "China": { risk: 4.2, stab: 7.9, advice: "Stable but high surveillance. Increasing regional tension in South China Sea." },
  "United States": { risk: 2.1, stab: 8.2, advice: "Stable. Economic growth moderate. Internal social polarization high." },
  "United Kingdom": { risk: 1.8, stab: 8.5, advice: "Safe. Normal security precautions apply." }
};

const state = {
  globe: null,
  allCountries: [],
  selectedID: null
};

/**
 * CORE LOGIC
 */
async function init() {
  // Initialize Globe
  const globe = Globe()(document.getElementById('globeViz'))
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundColor('#050a0f')
    .showAtmosphere(true)
    .atmosphereColor('#63b3ff')
    .atmosphereAltitude(0.15);

  // Fetch Borders
  const response = await fetch(BORDERS_URL);
  const geoData = await response.json();
  
  state.allCountries = geoData.features;

  globe.polygonsData(geoData.features)
    .polygonSideColor(() => 'rgba(0, 100, 200, 0.1)')
    .polygonStrokeColor(() => 'rgba(99, 179, 255, 0.6)')
    .polygonCapColor(d => {
      const name = d.properties.NAME;
      if (intelMap[name] && intelMap[name].risk > 7) return 'rgba(216, 79, 79, 0.15)';
      return 'rgba(99, 179, 255, 0.05)';
    })
    .polygonLabel(d => `
      <div style="background:#071019; padding:10px; border-radius:8px; border:1px solid #63b3ff;">
        <b style="color:#63b3ff">${d.properties.NAME}</b><br/>
        Type: ${d.properties.TYPE}
      </div>
    `)
    .onPolygonClick(d => {
      focusCountry(d);
    })
    .onPolygonHover(hoverD => globe
      .polygonStrokeColor(d => d === hoverD ? '#fff' : 'rgba(99, 179, 255, 0.6)')
      .polygonCapColor(d => d === hoverD ? 'rgba(99, 179, 255, 0.3)' : (intelMap[d.properties.NAME]?.risk > 7 ? 'rgba(216, 79, 79, 0.15)' : 'rgba(99, 179, 255, 0.05)'))
    );

  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.5;
  state.globe = globe;

  setupEvents();
}

/**
 * UI ACTIONS
 */
function focusCountry(feature) {
  const name = feature.properties.NAME;
  const iso = feature.properties.ISO_A3;
  
  // Update Labels
  document.getElementById('nameLabel').innerText = name;
  document.getElementById('regionLabel').innerText = feature.properties.CONTINENT;
  document.getElementById('flagIcon').innerText = "📍"; // Standard icons

  // Pull Intelligence
  const data = intelMap[name] || { 
    risk: (Math.random() * 5 + 1).toFixed(1), 
    stab: (Math.random() * 5 + 4).toFixed(1),
    advice: "Standard geopolitical m
